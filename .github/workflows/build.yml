name: build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Install apt dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake g++ libsndfile-dev libfontconfig-dev \
            libavformat-dev libavcodec-dev libavutil-dev \
            libswscale-dev libswresample-dev glslang-tools \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev \
            libxfixes-dev libxi-dev libxss-dev libxtst-dev \
            libxkbcommon-dev libdrm-dev libgbm-dev \
            libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev \
            libfuse2

      - name: Build SDL3 from source
        run: |
          git clone https://github.com/libsdl-org/SDL.git --depth 1 --branch release-3.4.10
          cmake -S SDL -B SDL/build -DCMAKE_BUILD_TYPE=Release
          cmake --build SDL/build -- -j$(nproc)
          sudo cmake --install SDL/build

      - name: Build SDL3_ttf from source
        run: |
          git clone https://github.com/libsdl-org/SDL_ttf.git --depth 1 --branch release-3.2.2
          cmake -S SDL_ttf -B SDL_ttf/build -DCMAKE_BUILD_TYPE=Release
          cmake --build SDL_ttf/build -- -j$(nproc)
          sudo cmake --install SDL_ttf/build

      - name: Configure
        run: cmake -S . -B build -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build -- -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Package AppImage
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp build/toheart2 AppDir/usr/bin/

          cat > AppDir/usr/share/applications/toheart2.desktop << 'EOF'
          [Desktop Entry]
          Name=ToHeart2 XRATED
          Exec=toheart2
          Icon=toheart2
          Type=Application
          Categories=Game;VisualNovel;
          EOF

          # minimal placeholder icon
          convert -size 256x256 xc:transparent AppDir/usr/share/icons/hicolor/256x256/apps/toheart2.png 2>/dev/null || touch AppDir/usr/share/icons/hicolor/256x256/apps/toheart2.png
          ln -s usr/share/icons/hicolor/256x256/apps/toheart2.png AppDir/toheart2.png 2>/dev/null || true

          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          ./linuxdeploy-x86_64.AppImage --appimage-extract-and-run \
            --appdir AppDir --output appimage
          mv ToHeart2_XRATED-*.AppImage toheart2-linux-x86_64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: toheart2-linux-x86_64.AppImage
          path: toheart2-linux-x86_64.AppImage

  macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install cmake sdl3 sdl3_ttf libsndfile fontconfig ffmpeg glslang

      - name: Configure
        run: cmake -S . -B build -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build -- -j$(sysctl -n hw.logicalcpu)

      - name: Test
        run: ctest --test-dir build --output-on-failure -E 'script-runtime-loose-lookup'

      - name: Package .app bundle
        run: |
          VERSION=$(cat VERSION)
          APP="toheart2.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"

          cp build/toheart2 "$APP/Contents/MacOS/"

          cat > "$APP/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>toheart2</string>
              <key>CFBundleIdentifier</key>
              <string>com.th2xr-portable.toheart2</string>
              <key>CFBundleName</key>
              <string>ToHeart2 XRATED</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>CFBundleVersion</key>
              <string>${VERSION}</string>
              <key>LSMinimumSystemVersion</key>
              <string>13.0</string>
          </dict>
          </plist>
          PLIST

          # Bundle Homebrew dependencies into the .app
          mkdir -p "$APP/Contents/Frameworks"
          for lib in SDL3 SDL3_ttf sndfile fontconfig avformat avcodec avutil swscale swresample; do
            src=$(brew --prefix)/lib/lib${lib}.dylib 2>/dev/null || continue
            if [ -f "$src" ]; then
              cp "$src" "$APP/Contents/Frameworks/"
              install_name_tool -change "$src" "@executable_path/../Frameworks/$(basename "$src")" \
                "$APP/Contents/MacOS/toheart2" 2>/dev/null || true
            fi
          done

          hdiutil create -volname "ToHeart2" -srcfolder "$APP" -ov -format UDZO toheart2-macos.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: toheart2-macos.dmg
          path: toheart2-macos.dmg

  windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-sdl3
            mingw-w64-ucrt-x86_64-sdl3-ttf
            mingw-w64-ucrt-x86_64-libsndfile
            mingw-w64-ucrt-x86_64-fontconfig
            mingw-w64-ucrt-x86_64-ffmpeg
            mingw-w64-ucrt-x86_64-glslang

      - name: Configure
        run: cmake -S . -B build -DBUILD_TESTING=ON -G 'Ninja'

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure -E 'script-runtime-loose-lookup'

      - name: Package zip
        run: |
          mkdir dist
          cp build/toheart2.exe dist/
          # copy required DLLs
          ldd build/toheart2.exe 2>/dev/null | grep '/ucrt64/bin/' | awk '{print $3}' | while read dll; do
            cp "$dll" dist/ 2>/dev/null || true
          done
          # also grab common transitive deps
          find /ucrt64/bin/ -name '*.dll' | while read dll; do
            cp "$dll" dist/ 2>/dev/null || true
          done

      - name: Create zip
        shell: pwsh
        run: Compress-Archive -Path dist/* -DestinationPath toheart2-windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: toheart2-windows-x64.zip
          path: toheart2-windows-x64.zip
