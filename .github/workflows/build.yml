name: build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v6

      - name: Install apt dependencies
        run: ci/install-linux-deps.sh

      - uses: libsdl-org/setup-sdl@main
        id: sdl
        with:
          install-linux-dependencies: true
          version: 3.4.10
          version-sdl-ttf: 3.2.2
          build-type: Release

      - name: Configure
        run: cmake -S . -B build -DBUILD_TESTING=ON -DCMAKE_PREFIX_PATH="${{ steps.sdl.outputs.prefix }}"

      - name: Build
        run: cmake --build build -- -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Package AppImage
        run: ci/package-linux-appimage.sh toheart2-linux-x86_64.AppImage

      - uses: actions/upload-artifact@v7
        with:
          name: toheart2-linux-x86_64.AppImage
          path: toheart2-linux-x86_64.AppImage
          archive: false

  macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          brew install cmake sdl3 sdl3_ttf fontconfig ffmpeg glslang

      - name: Configure
        run: cmake -S . -B build -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build -- -j$(sysctl -n hw.logicalcpu)

      - name: Test
        run: ctest --test-dir build --output-on-failure -E 'script-runtime-loose-lookup'

      - name: Package .app bundle
        run: ci/package-macos-app.sh toheart2-macos.dmg

      - uses: actions/upload-artifact@v7
        with:
          name: toheart2-macos.dmg
          path: toheart2-macos.dmg
          archive: false

  windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v6

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-sdl3
            mingw-w64-ucrt-x86_64-sdl3-ttf
            mingw-w64-ucrt-x86_64-fontconfig
            mingw-w64-ucrt-x86_64-ffmpeg
            mingw-w64-ucrt-x86_64-glslang

      - name: Configure
        run: cmake -S . -B build -DBUILD_TESTING=ON -G 'Ninja'

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure -E 'script-runtime-loose-lookup'

      - name: Package zip
        run: ci/package-windows-dist.sh full

      - name: Create zip
        shell: pwsh
        run: Compress-Archive -Path dist/* -DestinationPath toheart2-windows-x64.zip

      - uses: actions/upload-artifact@v7
        with:
          name: toheart2-windows-x64.zip
          path: toheart2-windows-x64.zip

  android:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Install system tools
        run: ci/install-android-system-tools.sh

      - name: Setup Android SDK
        run: ci/setup-android-sdk.sh

      - name: Cache SDL3 AAR
        id: cache-sdl3-aar
        uses: actions/cache@v5
        with:
          path: android/app/libs/SDL3-3.4.10.aar
          key: sdl3-aar-3.4.10

      - name: Download SDL3 AAR
        if: steps.cache-sdl3-aar.outputs.cache-hit != 'true'
        run: ci/download-sdl3-aar.sh

      - name: Cache SDL3_ttf AAR (16KB-aligned)
        id: cache-sdl3-ttf-aar
        uses: actions/cache@v5
        with:
          path: android/app/libs/SDL3_ttf-3.2.2.aar
          key: sdl3-ttf-aar-3.2.2-16kb-v2

      - name: Build SDL3_ttf from source (16KB-aligned)
        if: steps.cache-sdl3-ttf-aar.outputs.cache-hit != 'true'
        run: ci/download-or-build-sdl3-ttf-aar.sh

      - name: Cache FFmpeg
        id: cache-ffmpeg
        uses: actions/cache@v5
        with:
          path: third_party/ffmpeg-android
          key: ffmpeg-android-7.1.1-ndk29-arm64-v8a

      - name: Build FFmpeg
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: ci/build-android-third-party.sh ffmpeg

      - name: Cache libiconv
        id: cache-libiconv
        uses: actions/cache@v5
        with:
          path: third_party/libiconv-android
          key: libiconv-android-1.19-ndk29-arm64-v8a

      - name: Build libiconv
        if: steps.cache-libiconv.outputs.cache-hit != 'true'
        run: ci/build-android-third-party.sh libiconv

      - name: Cache zstd
        id: cache-zstd
        uses: actions/cache@v5
        with:
          path: third_party/zstd-android
          key: zstd-android-1.5.7-ndk29-arm64-v8a

      - name: Build zstd
        if: steps.cache-zstd.outputs.cache-hit != 'true'
        run: ci/build-android-third-party.sh zstd

      - name: Cache SQLite
        id: cache-sqlite
        uses: actions/cache@v5
        with:
          path: third_party/sqlite-android
          key: sqlite-android-3530200-ndk29-arm64-v8a

      - name: Build SQLite
        if: steps.cache-sqlite.outputs.cache-hit != 'true'
        run: ci/build-android-third-party.sh sqlite

      - name: Build APK
        run: |
          mkdir -p keys
          if [ -n "$DEBUG_KEYSTORE_B64" ]; then
            echo "$DEBUG_KEYSTORE_B64" | base64 -d > keys/debug.keystore
          fi
          chmod +x android/gradlew
          cd android && ./gradlew :app:assembleDebug -Pci=true
        env:
          DEBUG_KEYSTORE_B64: ${{ secrets.DEBUG_KEYSTORE_B64 }}

      - uses: actions/upload-artifact@v7
        with:
          name: th2xr-portable-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          archive: false
