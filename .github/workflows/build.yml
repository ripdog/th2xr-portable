name: build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Install apt dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake g++ libsndfile-dev libfontconfig-dev \
            libavformat-dev libavcodec-dev libavutil-dev \
            libswscale-dev libswresample-dev glslang-tools \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev \
            libxfixes-dev libxi-dev libxss-dev libxtst-dev \
            libxkbcommon-dev libdrm-dev libgbm-dev \
            libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev

      - name: Build SDL3 from source
        run: |
          git clone https://github.com/libsdl-org/SDL.git --depth 1 --branch release-3.4.10
          cmake -S SDL -B SDL/build -DCMAKE_BUILD_TYPE=Release
          cmake --build SDL/build -- -j$(nproc)
          sudo cmake --install SDL/build

      - name: Build SDL3_ttf from source
        run: |
          git clone https://github.com/libsdl-org/SDL_ttf.git --depth 1 --branch release-3.2.2
          cmake -S SDL_ttf -B SDL_ttf/build -DCMAKE_BUILD_TYPE=Release
          cmake --build SDL_ttf/build -- -j$(nproc)
          sudo cmake --install SDL_ttf/build

      - name: Configure
        run: cmake -S . -B build -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build -- -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure

  macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install cmake sdl3 sdl3_ttf libsndfile fontconfig ffmpeg glslang

      - name: Configure
        run: cmake -S . -B build -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build -- -j$(sysctl -n hw.logicalcpu)

      - name: Test
        run: ctest --test-dir build --output-on-failure -E 'script-runtime-loose-lookup'

  windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup vcpkg
        run: |
          Remove-Item -Recurse -Force C:\vcpkg -ErrorAction SilentlyContinue
          git clone https://github.com/microsoft/vcpkg.git C:/vcpkg
          C:/vcpkg/bootstrap-vcpkg.bat

      - name: Install vcpkg packages (no ffmpeg)
        shell: bash
        run: |
          C:/vcpkg/vcpkg install --triplet x64-windows

      - name: Download pre-built FFmpeg
        shell: bash
        run: |
          curl -fsSL -o ffmpeg.7z \
            'https://www.gyan.dev/ffmpeg/builds/ffmpeg-git-essentials.7z'
          7z x ffmpeg.7z "-oC:/ffmpeg" -y

      - name: Generate FFmpeg pkg-config files
        shell: bash
        run: |
          FF_DIR=$(ls -d /c/ffmpeg/ffmpeg-* 2>/dev/null || ls -d C:/ffmpeg/ffmpeg-*)
          mkdir -p "$FF_DIR/lib/pkgconfig"
          for lib in avformat avcodec avutil swscale swresample; do
            cat > "$FF_DIR/lib/pkgconfig/lib${lib}.pc" << EOF
          prefix=$FF_DIR
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include

          Name: lib${lib}
          Description: FFmpeg ${lib} library
          Version: 61.0.0
          Libs: -L\${libdir} -l${lib}
          Cflags: -I\${includedir}
          EOF
          done
          echo "PKG_CONFIG_PATH=$FF_DIR/lib/pkgconfig" >> $GITHUB_ENV

      - name: Configure
        run: |
          cmake -S . -B build -DBUILD_TESTING=ON `
            -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --config Release -- -j $env:NUMBER_OF_PROCESSORS

      - name: Test
        run: ctest --test-dir build --config Release --output-on-failure
