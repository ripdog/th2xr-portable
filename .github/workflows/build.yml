name: build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Install apt dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake g++ libsndfile-dev libfontconfig-dev \
            libavformat-dev libavcodec-dev libavutil-dev \
            libswscale-dev libswresample-dev glslang-tools \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev \
            libxfixes-dev libxi-dev libxss-dev libxtst-dev \
            libxkbcommon-dev libdrm-dev libgbm-dev \
            libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev

      - name: Build SDL3 from source
        run: |
          git clone https://github.com/libsdl-org/SDL.git --depth 1 --branch release-3.4.10
          cmake -S SDL -B SDL/build -DCMAKE_BUILD_TYPE=Release
          cmake --build SDL/build -- -j$(nproc)
          sudo cmake --install SDL/build

      - name: Build SDL3_ttf from source
        run: |
          git clone https://github.com/libsdl-org/SDL_ttf.git --depth 1 --branch release-3.4.0
          cmake -S SDL_ttf -B SDL_ttf/build -DCMAKE_BUILD_TYPE=Release
          cmake --build SDL_ttf/build -- -j$(nproc)
          sudo cmake --install SDL_ttf/build

      - name: Configure
        run: cmake -S . -B build -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build -- -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure

  macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install cmake sdl3 sdl3_ttf libsndfile fontconfig ffmpeg glslang

      - name: Configure
        run: cmake -S . -B build -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build -- -j$(sysctl -n hw.logicalcpu)

      - name: Test
        run: ctest --test-dir build --output-on-failure -E 'script-runtime-loose-lookup'

  windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows
    steps:
      - uses: actions/checkout@v4

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          ./vcpkg/bootstrap-vcpkg.bat

      - name: Install dependencies
        shell: bash
        run: |
          ./vcpkg/vcpkg install --triplet x64-windows \
            pkgconf sdl3 sdl3-ttf libsndfile fontconfig ffmpeg glslang

      - name: Configure
        run: |
          cmake -S . -B build -DBUILD_TESTING=ON \
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --config Release -- -j $env:NUMBER_OF_PROCESSORS

      - name: Test
        run: ctest --test-dir build --config Release --output-on-failure
