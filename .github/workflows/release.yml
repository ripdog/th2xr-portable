name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.release.outputs.upload_url }}
    steps:
      - name: Create release
        id: release
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "th2xr-portable v${VERSION}" \
            --draft
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}

  linux:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install apt dependencies
        run: ci/install-linux-deps.sh

      - uses: libsdl-org/setup-sdl@main
        id: sdl
        with:
          install-linux-dependencies: true
          version: 3.4.10
          version-sdl-ttf: 3.2.2
          build-type: Release

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${{ steps.sdl.outputs.prefix }}"

      - name: Build
        run: cmake --build build -- -j$(nproc)

      - name: Package AppImage
        run: ci/package-linux-appimage.sh "th2xr-portable-${{ github.ref_name }}-linux-x86_64.AppImage"

      - name: Upload AppImage
        run: gh release upload ${{ github.ref_name }} "th2xr-portable-${{ github.ref_name }}-linux-x86_64.AppImage"
        env:
          GH_TOKEN: ${{ github.token }}

  macos:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          brew install cmake sdl3 sdl3_ttf fontconfig ffmpeg glslang

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -- -j$(sysctl -n hw.logicalcpu)

      - name: Package .app bundle
        run: ci/package-macos-app.sh "th2xr-portable-${{ github.ref_name }}-macos.dmg"

      - name: Upload DMG
        run: gh release upload ${{ github.ref_name }} "th2xr-portable-${{ github.ref_name }}-macos.dmg"
        env:
          GH_TOKEN: ${{ github.token }}

  windows:
    needs: create-release
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v6

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-sdl3
            mingw-w64-ucrt-x86_64-sdl3-ttf
            mingw-w64-ucrt-x86_64-fontconfig
            mingw-w64-ucrt-x86_64-ffmpeg
            mingw-w64-ucrt-x86_64-glslang

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -G 'Ninja'

      - name: Build
        run: cmake --build build

      - name: Package zip
        run: ci/package-windows-dist.sh

      - name: Create zip
        shell: pwsh
        run: Compress-Archive -Path dist/* -DestinationPath "th2xr-portable-${{ github.ref_name }}-windows-x64.zip"

      - name: Upload zip
        shell: pwsh
        run: gh release upload ${{ github.ref_name }} "th2xr-portable-${{ github.ref_name }}-windows-x64.zip"
        env:
          GH_TOKEN: ${{ github.token }}

  android:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install system tools
        run: ci/install-android-system-tools.sh

      - name: Setup Android SDK
        run: ci/setup-android-sdk.sh

      - name: Cache SDL3 AAR
        id: cache-sdl3-aar
        uses: actions/cache@v4
        with:
          path: android/app/libs/SDL3-3.4.10.aar
          key: sdl3-aar-3.4.10

      - name: Download SDL3 AAR
        if: steps.cache-sdl3-aar.outputs.cache-hit != 'true'
        run: ci/download-sdl3-aar.sh

      - name: Cache SDL3_ttf AAR (16KB-aligned)
        id: cache-sdl3-ttf-aar
        uses: actions/cache@v4
        with:
          path: android/app/libs/SDL3_ttf-3.2.2.aar
          key: sdl3-ttf-aar-3.2.2-16kb-v2

      - name: Build SDL3_ttf from source (16KB-aligned)
        if: steps.cache-sdl3-ttf-aar.outputs.cache-hit != 'true'
        run: ci/download-or-build-sdl3-ttf-aar.sh

      - name: Cache FFmpeg
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: third_party/ffmpeg-android
          key: ffmpeg-android-7.1.1-ndk29-arm64-v8a

      - name: Build FFmpeg
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: ci/build-android-third-party.sh ffmpeg

      - name: Cache libiconv
        id: cache-libiconv
        uses: actions/cache@v4
        with:
          path: third_party/libiconv-android
          key: libiconv-android-1.19-ndk29-arm64-v8a

      - name: Build libiconv
        if: steps.cache-libiconv.outputs.cache-hit != 'true'
        run: ci/build-android-third-party.sh libiconv

      - name: Cache zstd
        id: cache-zstd
        uses: actions/cache@v4
        with:
          path: third_party/zstd-android
          key: zstd-android-1.5.7-ndk29-arm64-v8a

      - name: Build zstd
        if: steps.cache-zstd.outputs.cache-hit != 'true'
        run: ci/build-android-third-party.sh zstd

      - name: Cache SQLite
        id: cache-sqlite
        uses: actions/cache@v4
        with:
          path: third_party/sqlite-android
          key: sqlite-android-3530200-ndk29-arm64-v8a

      - name: Build SQLite
        if: steps.cache-sqlite.outputs.cache-hit != 'true'
        run: ci/build-android-third-party.sh sqlite

      - name: Build APK
        run: |
          mkdir -p keys
          if [ -n "$RELEASE_KEYSTORE_B64" ]; then
            echo "$RELEASE_KEYSTORE_B64" | base64 -d > keys/release.keystore
          fi
          chmod +x android/gradlew
          cd android && ./gradlew :app:assembleRelease
        env:
          RELEASE_KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_B64 }}

      - name: Upload APK
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk \
            "th2xr-portable-${{ github.ref_name }}-android-arm64.apk"
          gh release upload ${{ github.ref_name }} "th2xr-portable-${{ github.ref_name }}-android-arm64.apk"
        env:
          GH_TOKEN: ${{ github.token }}
